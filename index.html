<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 80%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        img {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Gerador de QR Code</h1>
    <p>Digite o texto ou URL que você deseja transformar em QR Code:</p>
    <input type="text" id="input-text" placeholder="Digite o texto ou URL aqui">
    <br>
    <button onclick="generateQRCode()">Gerar QR Code</button>

    <div id="qr-code"></div>

    <script>
        function generateQRCode() {
            var text = document.getElementById("input-text").value;
            if (!text) {
                alert("Por favor, insira um texto ou URL!");
                return;
            }
            var url = "https://quickchart.io/qr?text=" + encodeURIComponent(text);
            document.getElementById("qr-code").innerHTML = '<img src="' + url + '" alt="QR Code">';
        }
    </script>

</body>
</html>
